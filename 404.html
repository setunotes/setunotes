<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Setu Notes</title>
    <meta name="description" content="Oops! The page you're looking for doesn't exist. Return to Setu Notes and explore our NCERT books collection.">
    <meta name="keywords" content="404, page not found, error">
    <link rel="icon" href="favicon.svg" type="image/x-icon">
    <link rel="canonical" href="https://setunotes.com/404.html">
    <link rel="stylesheet" href="style.css">
    <style>
        /* 404 Page Styles */
        .error-page-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .error-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            z-index: -1;
        }

        .error-bg-animation {
            position: absolute;
            width: 400px;
            height: 400px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }

        .error-bg-animation:nth-child(1) {
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }

        .error-bg-animation:nth-child(2) {
            bottom: -150px;
            right: -100px;
            animation-delay: 2s;
        }

        .error-bg-animation:nth-child(3) {
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 4s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(30px);
            }
        }

        .error-container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 40px 20px;
            max-width: 600px;
        }

        .error-content {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 60px 40px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            animation: slideUp 0.8s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-code {
            font-size: 8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ffffff, rgba(255, 255, 255, 0.8));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 0;
            line-height: 1;
            text-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .error-title {
            font-size: 2.5rem;
            color: white;
            margin: 20px 0 15px 0;
            font-weight: 800;
        }

        .error-subtitle {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.85);
            margin: 0 0 30px 0;
            line-height: 1.6;
        }

        .error-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        .error-buttons {
            display: flex;
            gap: 15px;
            flex-direction: column;
            margin-top: 40px;
        }

        .error-btn {
            display: inline-block;
            padding: 16px 40px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            backdrop-filter: blur(10px);
        }

        .error-btn-primary {
            background: rgba(255, 255, 255, 0.25);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.4);
        }

        .error-btn-primary:hover {
            background: rgba(255, 255, 255, 0.35);
            border-color: rgba(255, 255, 255, 0.6);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        .error-btn-secondary {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .error-btn-secondary:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-3px);
        }

        .suggestions {
            margin-top: 50px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .suggestions-title {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 600;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .suggestions-links {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .suggestion-link {
            display: block;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .suggestion-link:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .error-code {
                font-size: 5rem;
            }

            .error-title {
                font-size: 1.8rem;
            }

            .error-subtitle {
                font-size: 1rem;
            }

            .error-content {
                padding: 40px 25px;
            }

            .error-buttons {
                flex-direction: column;
            }

            .error-btn {
                padding: 14px 30px;
            }

            .suggestions-links {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .error-code {
                font-size: 3.5rem;
            }

            .error-title {
                font-size: 1.4rem;
            }

            .error-subtitle {
                font-size: 0.95rem;
            }

            .error-content {
                padding: 30px 20px;
            }

            .error-container {
                padding: 20px 15px;
            }

            .error-icon {
                font-size: 3rem;
            }

            .error-buttons {
                gap: 10px;
            }

            .error-btn {
                padding: 12px 24px;
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body>

<div class="error-page-wrapper">
    <!-- Background animation -->
    <div class="error-background">
        <div class="error-bg-animation"></div>
        <div class="error-bg-animation"></div>
        <div class="error-bg-animation"></div>
    </div>

    <!-- Error Content -->
    <div class="error-container">
        <div class="error-content">
            <div class="error-icon">📚</div>
            <h1 class="error-code">404</h1>
            <h2 class="error-title">Page Not Found</h2>
            <p class="error-subtitle">
                Oops! The book you're looking for seems to have disappeared from our library. 
                Let's help you find what you need.
            </p>

            <div class="error-buttons">
                <a href="index.html" class="error-btn error-btn-primary">
                    🏠 Back to Home
                </a>
                <a href="index.html" class="error-btn error-btn-secondary">
                    📚 Browse All Books
                </a>
            </div>

            <div class="suggestions">
                <div class="suggestions-title">Quick Links</div>
                <div class="suggestions-links">
                    <a href="index.html" class="suggestion-link">Home</a>
                    <a href="about.html" class="suggestion-link">About Us</a>
                    <a href="/blog" class="suggestion-link">Blog</a>
                    <a href="faq.html" class="suggestion-link">FAQ</a>
                    <a href="contact.html" class="suggestion-link">Contact</a>
                    <a href="privacy.html" class="suggestion-link">Privacy</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Dark mode support
    if (localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark');
    }

    // Toggle dark mode
    document.addEventListener('keydown', (e) => {
        if (e.altKey && e.key === 'd') {
            document.body.classList.toggle('dark');
            localStorage.setItem('darkMode', document.body.classList.contains('dark'));
        }
    });
</script>

</body>
</html>
